name: Daily Fixtures (Claude)

on:
  schedule:
    # 22:00 UTC = Türkiye saatiyle ertesi gün 01:00.
    # Türkiye kalıcı olarak UTC+3'tür (yaz saati uygulaması yok), kayma olmaz.
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Hedef gün (YYYY-MM-DD) — boş bırakılırsa Türkiye takvimindeki bugün'
        required: false
        type: string

permissions:
  contents: write

# Aynı anda iki üretim çalışmasın (manuel tetikleme + cron çakışması)
concurrency:
  group: daily-fixtures
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Uygulamanın package.json'ına dokunmadan, yalnız CI için kur
      - name: Install Anthropic SDK
        run: npm install --no-save --no-package-lock @anthropic-ai/sdk

      - name: Generate fixtures
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            node scripts/generate-fixtures.mjs --date "${{ inputs.date }}"
          else
            node scripts/generate-fixtures.mjs
          fi

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet assets/matches-daily.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "fixtures-bot"
          git config user.email "bot@users.noreply.github.com"
          git add assets/matches-daily.json
          git commit -m "auto: daily fixtures $(date -u +%Y-%m-%d) [skip ci]"
          git push

      # Üretim başarısız olursa eski dosya yerinde kalır; burada görünür olsun
      - name: Summary
        if: always()
        run: |
          echo "### Günlük maç üretimi" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          node -e "const d=require('./assets/matches-daily.json');console.log(JSON.stringify({date:d.date,generated_at:d.generated_at,...d.stats},null,2))" >> "$GITHUB_STEP_SUMMARY" || echo "(dosya okunamadı)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
