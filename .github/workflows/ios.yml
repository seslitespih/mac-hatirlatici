name: iOS App Store Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Patch node_modules Swift files for Xcode 26 compatibility
        run: |
          python3 -c "
          import os, re

          # 1) expo-localization: add default case to Calendar.Identifier switch
          p1 = 'node_modules/expo-localization/ios/LocalizationModule.swift'
          if os.path.exists(p1):
              c = open(p1).read()
              if 'default:' not in c:
                  c2 = re.sub(r'(    switch calendar\.identifier \{.*?)(    \})', lambda m: m.group(1) + '    default:\n      return \"\"\n    }', c, flags=re.DOTALL)
                  open(p1, 'w').write(c2)
                  print('Patched expo-localization' if c2 != c else 'expo-localization: no change')
              else:
                  print('expo-localization: already patched')

          # 2) expo-device: replace TARGET_OS_SIMULATOR (C macro not available in Swift/Xcode26)
          p2 = 'node_modules/expo-device/ios/UIDevice.swift'
          if os.path.exists(p2):
              c = open(p2).read()
              if 'TARGET_OS_SIMULATOR' in c:
                  c2 = c.replace(
                      'return TARGET_OS_SIMULATOR != 0',
                      '#if targetEnvironment(simulator)\n    return true\n    #else\n    return false\n    #endif'
                  )
                  open(p2, 'w').write(c2)
                  print('Patched expo-device' if c2 != c else 'expo-device: no change')
              else:
                  print('expo-device: already patched')
          "

      - name: Create .env
        run: |
          printf 'GROQ_API_KEY=%s\nREVENUECAT_IOS_KEY=%s\nREVENUECAT_ANDROID_KEY=%s\n' \
            "${{ secrets.GROQ_API_KEY }}" \
            "${{ secrets.REVENUECAT_IOS_KEY }}" \
            "${{ secrets.REVENUECAT_ANDROID_KEY }}" > .env

      # CocoaPods'u prebuild'den ÖNCE güncelle, expo'nun kendi içindeki pod install için
      - name: Install CocoaPods 1.16
        run: |
          brew install cocoapods || brew upgrade cocoapods || true
          pod --version

      - name: Expo prebuild (iOS native proje oluştur)
        env:
          NODE_BINARY: /opt/homebrew/opt/node@22/bin/node
          EXPO_NO_COCOAPODS_INSTALL: 1
        run: npx expo prebuild --platform ios --clean

      # Podfile uyumluluk yamaları
      - name: Patch Podfile
        run: |
          sed -i '' '/:privacy_file_aggregation_enabled/d' ios/Podfile
          python3 -c "c=open('ios/Podfile').read();c=c.replace('platform :ios','use_frameworks! :linkage => :static\nplatform :ios',1);open('ios/Podfile','w').write(c)"
          echo "=== Podfile first 15 lines ==="
          head -15 ios/Podfile

      - name: CocoaPods install
        env:
          NODE_BINARY: $(which node)
        run: |
          cd ios
          pod install --repo-update

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Set up App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_PRIVATE_KEY" > \
            ~/.appstoreconnect/private_keys/AuthKey_4V8WB44R99.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_4V8WB44R99.p8

      - name: Install certificate and setup provisioning profile
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: 4V8WB44R99
          APP_STORE_CONNECT_ISSUER_ID: c62db938-88be-40a4-94d5-0542ba1512ff
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.IOS_DIST_KEY }}
        run: |
          pip3 install codemagic-cli-tools -q --break-system-packages || \
          pip3 install codemagic-cli-tools -q --user
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          keychain initialize
          app-store-connect fetch-signing-files com.machatirlatici.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          echo "=== Installed profiles (Xcode UserData) ==="
          ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ 2>/dev/null || echo "No Xcode UserData profiles"
          echo "=== Copying profiles to MobileDevice dir ==="
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/*.mobileprovision \
             ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || true
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles in MobileDevice dir"

      - name: Detect Xcode workspace & scheme
        run: |
          WS=$(find ios -maxdepth 1 -name "*.xcworkspace" | grep -v "Pods" | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "WORKSPACE=$WS"  >> $GITHUB_ENV
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "Workspace: $WS — Scheme: $SCHEME"

      - name: Xcode archive
        run: |
          set -o pipefail
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | head -1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | plutil -extract UUID raw - 2>/dev/null)
            echo "Profile UUID: $PROFILE_UUID"
          else
            echo "WARNING: No provisioning profile found, archive will fail signing"
            PROFILE_UUID=""
          fi
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/HangiKanalda.xcarchive" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            ${PROFILE_UUID:+PROVISIONING_PROFILE="$PROFILE_UUID"} \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty --simple || \
          (echo "=== XCODEBUILD ERRORS ===" && grep -E "error:|❌" /tmp/xcodebuild.log | tail -40 && exit 1)

      - name: Export & sign IPA
        run: |
          set -o pipefail
          PROFILE_NAME=$(security cms -D -i \
            "$RUNNER_TEMP/HangiKanalda.xcarchive/Products/Applications/$SCHEME.app/embedded.mobileprovision" \
            2>/dev/null | plutil -extract Name raw - 2>/dev/null || echo "")

          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0"><dict><key>method</key><string>app-store-connect</string><key>teamID</key><string>HJ55A5P4J8</string><key>signingStyle</key><string>manual</string><key>provisioningProfiles</key><dict><key>com.machatirlatici.app</key><string>%s</string></dict></dict></plist>\n' \
            "$PROFILE_NAME" > /tmp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/HangiKanalda.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            | xcpretty --simple

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(find "$RUNNER_TEMP/ipa" -name '*.ipa' | head -1)" \
            --apiKey "4V8WB44R99" \
            --apiIssuer "c62db938-88be-40a4-94d5-0542ba1512ff" \
            --apiPrivateKeyFile \
              "$HOME/.appstoreconnect/private_keys/AuthKey_4V8WB44R99.p8"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: HangiKanalda-${{ github.run_number }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          keychain delete 2>/dev/null || true
          rm -rf ~/.appstoreconnect /tmp/ExportOptions.plist 2>/dev/null || true
