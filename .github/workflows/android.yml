name: Android Play Store Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Android versionCode (must be > 5)'
        required: true
        default: '6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          printf 'GROQ_API_KEY=%s\nREVENUECAT_IOS_KEY=%s\nREVENUECAT_ANDROID_KEY=%s\n' \
            "${{ secrets.GROQ_API_KEY }}" \
            "${{ secrets.REVENUECAT_IOS_KEY }}" \
            "${{ secrets.REVENUECAT_ANDROID_KEY }}" > .env

      - name: Expo prebuild (Android)
        env:
          BUILD_NUMBER: ${{ github.event.inputs.version_code }}
          VERSION_CODE: ${{ github.event.inputs.version_code }}
        run: npx expo prebuild --platform android --clean

      - name: Restore keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/mac-hatirlatici.keystore

      - name: Build Release AAB
        env:
          VERSION_CODE: ${{ github.event.inputs.version_code }}
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.storeFile=mac-hatirlatici.keystore \
            -Pandroid.storePassword="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.keyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.keyPassword="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: HangiKanalda-${{ github.event.inputs.version_code }}.aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 14

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.machatirlatici.app
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew
