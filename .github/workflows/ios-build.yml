name: iOS Build & Upload to ASC

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (must be higher than last submitted)'
        required: true
        default: '72'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node 20 ─────────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # ── 3. Keychain + Certificate ─────────────────────────────────────────────
      - name: Import distribution certificate
        env:
          P12_BASE64:   ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASS=$(openssl rand -hex 20)
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s build.keychain
          security unlock-keychain  -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$P12_BASE64" | base64 --decode -o /tmp/dist.p12
          security import /tmp/dist.p12 -k build.keychain -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" build.keychain

          echo "Certificate imported."

      # ── 4. Provisioning Profile ────────────────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' \
            /dev/stdin <<< "$(security cms -D -i \
            ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision)")
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Profile UUID: $UUID"

      # ── 5. Expo Prebuild ───────────────────────────────────────────────────────
      - name: Expo prebuild (generate Xcode project)
        env:
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
        run: npx expo prebuild --platform ios --clean --non-interactive

      # ── 6. Discover Workspace & Scheme ────────────────────────────────────────
      - name: Discover Xcode workspace and scheme
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/{found=1;next} found{gsub(/^[[:space:]]+/,""); if(NF) {print; exit}}')
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "SCHEME=$SCHEME"       >> $GITHUB_ENV
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"

      # ── 7. Archive ────────────────────────────────────────────────────────────
      - name: Build Xcode archive
        env:
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
        run: |
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            -allowProvisioningUpdates \
            -destination "generic/platform=iOS" \
            | grep -E "error:|warning:|xcarchive|Build" || true

          ls "$RUNNER_TEMP/app.xcarchive"

      # ── 8. Export IPA ─────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key>              <string>app-store</string>
            <key>teamID</key>              <string>HJ55A5P4J8</string>
            <key>uploadSymbols</key>       <true/>
            <key>signingStyle</key>        <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.machatirlatici.app</key>
              <string>build</string>
            </dict>
          </dict></plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath   "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV
          echo "IPA: $IPA_PATH"

      # ── 9. Upload to App Store Connect ────────────────────────────────────────
      - name: Upload to App Store Connect
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID:     ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:  ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey    "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      # ── 10. Cleanup keychain ──────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
