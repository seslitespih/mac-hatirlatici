name: iOS Build & TestFlight

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Expo Prebuild iOS
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Install Certificate & Provisioning Profile
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KC_PASS="tmpKC999"

          security create-keychain -p "$KC_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$GITHUB_WORKSPACE/certs/distribution.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "MacHatirlatici2024!" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KC_PASS" "$KEYCHAIN_PATH"

          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$GITHUB_WORKSPACE/certs/profile.mobileprovision" \
            "$PROFILES_DIR/62ec8e61-e2b2-4ecc-9c56-7ebab9736dc7.mobileprovision"

          echo "TEAM_ID=HJ55A5P4J8" >> $GITHUB_ENV

      - name: Detect Workspace & Scheme
        run: |
          WS=$(ls ios/*.xcworkspace | head -1)
          WS_NAME=$(basename "$WS")
          echo "WORKSPACE=ios/$WS_NAME" >> $GITHUB_ENV
          SCHEME=$(xcodebuild -list -workspace "ios/$WS_NAME" 2>/dev/null \
            | awk '/Schemes:/,0' \
            | grep -v 'Schemes:' \
            | sed 's/^[[:space:]]*//' \
            | grep -v '^$' \
            | head -1)
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "Detected scheme: $SCHEME"

      - name: Set Build Number
        run: |
          BUILD_NUM=$((20 + ${{ github.run_number }}))
          echo "Build number: $BUILD_NUM"
          find ios -name "Info.plist" -not -path "*/Pods/*" | while read p; do
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$p" 2>/dev/null || true
          done

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="mac-hatirlatici-v2" \
            | xcpretty || true

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>HJ55A5P4J8</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.machatirlatici.app</key>
              <string>mac-hatirlatici-v2</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          python3 -c "
          import json, os
          key = os.environ['ASC_API_KEY_CONTENT']
          data = {
            'key_id': '4V8WB44R99',
            'issuer_id': 'c62db938-88be-40a4-94d5-0542ba1512ff',
            'key': key,
            'in_house': False
          }
          json.dump(data, open('/tmp/asc_key.json', 'w'))
          "

          IPA=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          echo "Uploading: $IPA"

          gem install fastlane --no-document 2>/dev/null || true

          fastlane pilot upload \
            --api_key_path /tmp/asc_key.json \
            --ipa "$IPA" \
            --skip_waiting_for_build_processing true

          rm -f /tmp/asc_key.json
