name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Patch expo-modules-core (AGP 8.6 compatibility fix)
        run: |
          python3 - << 'EOF'
          path = 'node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle'
          with open(path) as f:
              content = f.read()
          if 'from components.release' in content:
              old = '      publishing {\n        publications {\n          release(MavenPublication) {\n            from components.release\n          }\n        }\n        repositories {\n          maven {\n            url = mavenLocal().url\n          }\n        }\n      }'
              new = '      def releaseComponent = components.findByName(\'release\')\n      if (releaseComponent != null) {\n        publishing {\n          publications {\n            release(MavenPublication) {\n              from releaseComponent\n            }\n          }\n          repositories {\n            maven {\n              url = mavenLocal().url\n            }\n          }\n        }\n      }'
              result = content.replace(old, new)
              if result == content:
                  print('Pattern not found with exact match, trying flexible approach')
                  import re
                  result = re.sub(
                      r'(project\.afterEvaluate\s*\{)\s*publishing\s*\{[^}]*publications\s*\{[^}]*release\s*\(MavenPublication\)\s*\{[^}]*from\s+components\.release[^}]*\}[^}]*\}[^}]*repositories\s*\{[^}]*maven\s*\{[^}]*url\s*=\s*mavenLocal\(\)\.url[^}]*\}[^}]*\}[^}]*\}',
                      r'''\1
              def releaseComponent = components.findByName('release')
              if (releaseComponent != null) {
                publishing {
                  publications {
                    release(MavenPublication) {
                      from releaseComponent
                    }
                  }
                  repositories {
                    maven {
                      url = mavenLocal().url
                    }
                  }
                }
              }''',
                      result
                  )
              with open(path, 'w') as f:
                  f.write(result)
              print('Patch applied successfully')
          else:
              print('Already patched or pattern not found - skipping')
          EOF

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;28.2.13676358" "cmake;3.22.1"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Patch react-native gradle plugin (sonatype snapshotsOnly fix)
        run: |
          FILE="node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/DependencyUtils.kt"
          sed -i 's|mavenRepoFromUrl("https://oss.sonatype.org/content/repositories/snapshots/") { repo ->$|mavenRepoFromUrl("https://oss.sonatype.org/content/repositories/snapshots/") { repo ->\n          repo.mavenContent { it.snapshotsOnly() }|' "$FILE"
          echo "Patched DependencyUtils.kt:"
          grep -A3 "sonatype" "$FILE"
          rm -rf node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/build/classes

      - name: Build release AAB
        run: cd android && chmod +x ./gradlew && ./gradlew bundleRelease --no-daemon
        env:
          NODE_ENV: production
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: Fix 16KB ELF alignment (Python ELF patcher + re-sign)
        run: |
          python3 << 'PYEOF'
          import struct, os, zipfile, shutil, subprocess

          TARGET_ALIGN = 0x4000  # 16 KB

          def fix_elf_alignment(data):
              """Insert padding between PT_LOAD segments so that
              p_offset mod 16384 == p_vaddr mod 16384 for every LOAD segment.
              Returns new bytearray, or None if already aligned / not ELF."""
              if data[:4] != b'\x7fELF' or data[4] != 2 or data[5] != 1:
                  return None
              PT_LOAD = 1
              def ru8(o): return struct.unpack_from('<Q', data, o)[0]
              def ru2(o): return struct.unpack_from('<H', data, o)[0]
              def ru4(o): return struct.unpack_from('<I', data, o)[0]
              e_phoff     = ru8(0x20); e_shoff = ru8(0x28)
              e_phentsize = ru2(0x36); e_phnum = ru2(0x38)
              e_shentsize = ru2(0x3a); e_shnum = ru2(0x3c)
              segs = []
              for i in range(e_phnum):
                  b = e_phoff + i * e_phentsize
                  segs.append({
                      'hdr_off': b, 'p_type': ru4(b),
                      'p_offset': ru8(b+8), 'p_vaddr': ru8(b+0x10),
                      'p_align': ru8(b+0x30),
                  })
              loads = sorted([s for s in segs if s['p_type']==PT_LOAD],
                             key=lambda s: s['p_offset'])
              def bad(s):
                  return (s['p_align'] < TARGET_ALIGN or
                          (s['p_offset'] % TARGET_ALIGN) != (s['p_vaddr'] % TARGET_ALIGN))
              if not any(bad(s) for s in loads):
                  return None
              # Calculate insertions in ORIGINAL coordinate space
              insertions = []; cum = 0
              for seg in loads[1:]:
                  cur = seg['p_offset'] + cum
                  req = seg['p_vaddr'] % TARGET_ALIGN
                  rem = cur % TARGET_ALIGN
                  if rem == req:
                      continue
                  pad = (req - rem) if req > rem else (TARGET_ALIGN - rem + req)
                  insertions.append((seg['p_offset'], pad))
                  cum += pad
              if not insertions:
                  return None
              # Build new file data
              new = bytearray(); prev = 0
              for pos, pad in insertions:
                  new += data[prev:pos]
                  new += b'\x00' * pad
                  prev = pos
              new += data[prev:]
              # Offset shift helper (all positions in ORIGINAL coordinates)
              def shift(o):
                  a = 0
                  for pos, pad in insertions:
                      if o >= pos: a += pad
                  return o + a
              def wu8(buf, o, v): struct.pack_into('<Q', buf, o, v)
              # Update program headers
              for seg in segs:
                  h = shift(seg['hdr_off'])
                  if seg['p_type'] == PT_LOAD:
                      wu8(new, h+8,    shift(seg['p_offset']))
                      wu8(new, h+0x30, max(seg['p_align'], TARGET_ALIGN))
                  elif seg['p_offset'] > 0:
                      wu8(new, h+8, shift(seg['p_offset']))
              # Update section headers
              for i in range(e_shnum):
                  sh = e_shoff + i * e_shentsize
                  nsh = shift(sh)
                  sht = struct.unpack_from('<I', data, sh+4)[0]
                  if sht not in (0, 8):
                      wu8(new, nsh+0x18, shift(struct.unpack_from('<Q', data, sh+0x18)[0]))
              wu8(new, 0x28, shift(e_shoff))
              return new

          WORKSPACE = os.environ['GITHUB_WORKSPACE']
          AAB      = WORKSPACE + '/android/app/build/outputs/bundle/release/app-release.aab'
          KEYSTORE = WORKSPACE + '/android/app/mac-hatirlatici.keystore'
          WORK     = '/tmp/aab_16kb'
          CONTENTS = WORK + '/contents'
          UNSIGNED = WORK + '/unsigned.aab'

          if os.path.exists(WORK): shutil.rmtree(WORK)
          os.makedirs(CONTENTS)

          print("Extracting AAB...")
          with zipfile.ZipFile(AAB) as z:
              z.extractall(CONTENTS)

          # Remove old signature so we can re-sign cleanly
          metainf = os.path.join(CONTENTS, 'META-INF')
          if os.path.exists(metainf):
              shutil.rmtree(metainf)

          patched = skipped = 0
          for root, _, files in os.walk(CONTENTS):
              for fname in files:
                  if not fname.endswith('.so'):
                      continue
                  path = os.path.join(root, fname)
                  with open(path, 'rb') as f:
                      orig = bytearray(f.read())
                  fixed = fix_elf_alignment(orig)
                  if fixed:
                      with open(path, 'wb') as f:
                          f.write(fixed)
                      print(f'Patched: {fname} (+{len(fixed)-len(orig)} bytes)')
                      patched += 1
                  else:
                      skipped += 1
          print(f'ELF fix complete: {patched} patched, {skipped} already-OK/skipped')

          print("Re-zipping...")
          os.chdir(CONTENTS)
          subprocess.run(['zip', '-r', UNSIGNED, '.'], check=True, capture_output=True)
          os.chdir(WORKSPACE)

          print("Re-signing with jarsigner...")
          subprocess.run([
              'jarsigner',
              '-keystore', KEYSTORE,
              '-storepass', 'MacHatirlatici2024!',
              '-keypass',   'MacHatirlatici2024!',
              '-sigalg',    'SHA256withRSA',
              '-digestalg', 'SHA-256',
              UNSIGNED,
              'mac-hatirlatici',
          ], check=True)

          shutil.copy2(UNSIGNED, AAB)
          print('Done — 16KB ELF alignment fixed and AAB re-signed')
          PYEOF

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: HangiKanalda-v56.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14
