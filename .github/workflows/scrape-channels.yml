name: Scrape Daily Channel Data

on:
  schedule:
    # Her gün 05:00 UTC (Türkiye 08:00) — maçlar başlamadan önce
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Manuel tetikleme için

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scripts/scrape_channels.py --once

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet assets/channels-daily.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "channel-scraper-bot"
          git config user.email "bot@users.noreply.github.com"
          git add assets/channels-daily.json
          git commit -m "auto: daily channel data $(date -u +%Y-%m-%d) [skip ci]"
          git push
